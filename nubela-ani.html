<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orange Nebula Animation</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        .container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        .title {
            position: absolute;
            left: 0;
            right: 0;
            bottom: calc(40svh + 350px + 20px);
            text-align: center;
            color: #fff;
            font-size: 16px;
            font-weight: 500;
            z-index: 10;
        }

        @media (min-width: 640px) {
            .title {
                font-size: 18px;
            }
        }

        .nebula-container {
            position: absolute;
            left: 0;
            right: 0;
            bottom: 40svh;
            width: 100%;
            height: 350px;
            min-height: 200px;
        }

        canvas {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="nebula-container">
            <canvas id="nebula"></canvas>
        </div>
        <h2 class="title"></h2>
    </div>

    <script>
        const canvas = document.getElementById('nebula');
        const ctx = canvas.getContext('2d');

        // Set canvas size
        function resizeCanvas() {
            const container = canvas.parentElement;
            canvas.width = container.offsetWidth;
            canvas.height = container.offsetHeight;
        }

        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // Particle system - 多层轨道，立体感
        class Particle {
            constructor(index) {
                this.centerX = canvas.width / 2;
                this.centerY = canvas.height / 2;
                this.index = index;
                this.reset();
            }

            reset() {
                // 多层轨道，从内到外
                const layer = Math.floor(this.index / 50); // 4层
                const baseRadius = 60 + layer * 30; // 60, 90, 120, 150
                this.radius = baseRadius + Math.random() * 20; // 每层有随机性
                this.angle = Math.random() * Math.PI * 2;
                this.speed = 0.002 + Math.random() * 0.001; // 稍微不同的速度
                this.baseSize = 1 + Math.random() * 1.5;
                this.opacity = 0.4 + Math.random() * 0.4;
                
                // 神经元闪烁
                this.flashSpeed = 0.02 + Math.random() * 0.03;
                this.flashOffset = Math.random() * Math.PI * 2;
                
                // 呼吸效果 - 部分粒子
                this.isBreathing = Math.random() > 0.94; // 6%的粒子会呼吸
                this.breathSpeed = 0.03 + Math.random() * 0.02;
                this.breathOffset = Math.random() * Math.PI * 2;
                this.size = this.baseSize;
                
                // 三角形粒子标记 - 部分粒子会形成三角形
                this.isTriangleParticle = Math.random() > 0.85; // 15%的粒子
                this.speedMultiplier = 1; // 速度倍率
            }

            update(time) {
                // 三角形粒子速度更快
                const currentSpeed = this.speed * this.speedMultiplier;
                this.angle += currentSpeed;
                this.x = this.centerX + Math.cos(this.angle) * this.radius;
                this.y = this.centerY + Math.sin(this.angle) * this.radius;
                
                // 闪烁效果
                this.currentOpacity = this.opacity * (0.5 + Math.sin(time * this.flashSpeed + this.flashOffset) * 0.5);
                
                // 呼吸效果
                if (this.isBreathing) {
                    const breath = Math.sin(time * this.breathSpeed + this.breathOffset) * 0.5 + 0.5;
                    this.size = this.baseSize + breath * 3; // 变大3px
                }
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 165, 0, ${this.currentOpacity})`;
                ctx.fill();
            }
        }

        // Create particles - 固定数量，均匀分布
        const particleCount = 200;
        const particles = [];

        for (let i = 0; i < particleCount; i++) {
            particles.push(new Particle(i));
        }

        // Animation loop
        let time = 0;
        const connectionDistance = 40;
        const triangleDistance = 35; // 三角形绘制距离 - 减小，让三角形更少出现
        
        function animate() {
            // 清除画布
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw triangles - 三个粒子靠近时绘制
            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    const dist1 = getDistance(particles[i], particles[j]);
                    if (dist1 > triangleDistance) continue;
                    
                    for (let k = j + 1; k < particles.length; k++) {
                        const dist2 = getDistance(particles[i], particles[k]);
                        const dist3 = getDistance(particles[j], particles[k]);
                        
                        if (dist2 < triangleDistance && dist3 < triangleDistance) {
                            // 标记这三个粒子为三角形粒子，加速旋转
                            particles[i].speedMultiplier = 1.5;
                            particles[j].speedMultiplier = 1.5;
                            particles[k].speedMultiplier = 1.5;
                            
                            // 计算闪烁
                            const flash1 = Math.sin(time * 0.03 + i * 0.2) * 0.5 + 0.5;
                            const flash2 = Math.sin(time * 0.03 + j * 0.2) * 0.5 + 0.5;
                            const flash3 = Math.sin(time * 0.03 + k * 0.2) * 0.5 + 0.5;
                            const avgFlash = (flash1 + flash2 + flash3) / 3;
                            const avgDist = (dist1 + dist2 + dist3) / 3;
                            const opacity = (1 - avgDist / triangleDistance) * 0.3 * avgFlash;
                            
                            if (opacity > 0.05) {
                                ctx.beginPath();
                                ctx.moveTo(particles[i].x, particles[i].y);
                                ctx.lineTo(particles[j].x, particles[j].y);
                                ctx.lineTo(particles[k].x, particles[k].y);
                                ctx.closePath();
                                ctx.fillStyle = `rgba(255, 170, 60, ${opacity})`;
                                ctx.fill();
                            }
                        }
                    }
                }
            }
            
            // 重置没有形成三角形的粒子速度
            particles.forEach(p => {
                if (p.speedMultiplier > 1) {
                    // 逐渐减速
                    p.speedMultiplier = Math.max(1, p.speedMultiplier - 0.01);
                }
            });

            // Draw connections - 神经元连接
            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    const distance = getDistance(particles[i], particles[j]);
                    
                    if (distance < connectionDistance) {
                        // 神经元闪烁连接
                        const flash1 = Math.sin(time * 0.03 + i * 0.2) * 0.5 + 0.5;
                        const flash2 = Math.sin(time * 0.03 + j * 0.2) * 0.5 + 0.5;
                        const combinedFlash = flash1 * flash2;
                        const opacity = (1 - distance / connectionDistance) * 0.6 * combinedFlash;
                        
                        if (opacity > 0.1) { // 只绘制明显的连线
                            ctx.beginPath();
                            ctx.moveTo(particles[i].x, particles[i].y);
                            ctx.lineTo(particles[j].x, particles[j].y);
                            ctx.strokeStyle = `rgba(255, 180, 80, ${opacity})`;
                            ctx.lineWidth = 1;
                            ctx.stroke();
                        }
                    }
                }
            }

            // Draw particles
            particles.forEach(particle => {
                particle.update(time);
                particle.draw();
            });

            time++;
            requestAnimationFrame(animate);
        }

        // 辅助函数：计算两点距离
        function getDistance(p1, p2) {
            const dx = p1.x - p2.x;
            const dy = p1.y - p2.y;
            return Math.sqrt(dx * dx + dy * dy);
        }

        animate();
    </script>
</body>
</html>
